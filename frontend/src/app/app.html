<div class="app-shell">
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>

  <header class="topbar">
    <a class="brand" [routerLink]="brandRoute()">
      <span class="brand-mark">eB</span>
      <strong>eBilet Miejski</strong>
    </a>

    <nav class="topnav" aria-label="Glowna nawigacja">
      @for (item of navItems(); track item.href) {
        <a
          [class.active]="isNavItemActive(item)"
          [routerLink]="item.href"
          [fragment]="item.fragment"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="user-actions">
      @if (currentUser(); as user) {
        @if (user.role === 'PASSENGER') {
          <div class="balance-chip">
            <strong>{{ user.balance | number: '1.2-2' }} PLN</strong>
            <button class="top-up-button" type="button" (click)="openTopUpModal()" aria-label="Doladuj konto">+</button>
          </div>
        }

        <button class="ghost-button" type="button" (click)="logout()">Wyloguj</button>
      } @else {
        <a class="ghost-link" routerLink="/login">Logowanie</a>
        <a class="solid-link" routerLink="/register">Rejestracja</a>
      }
    </div>
  </header>

  <main class="page-wrap">
    <router-outlet />
  </main>
</div>

@if (isTopUpModalOpen()) {
  <app-top-up-modal
    [presetAmounts]="presetTopUpAmounts"
    [form]="topUpForm"
    [error]="topUpError()"
    [isSubmitting]="isTopUpSubmitting()"
    (closeRequested)="closeTopUpModal()"
    (presetSelected)="selectTopUpAmount($event)"
    (submitRequested)="submitTopUp()"
  />
}
