<section class="centered-page">
  <article class="panel auth-card">
    <p class="eyebrow">Nowe konto</p>
    <h1>Załóż konto i kupuj bilety online</h1>
    <p class="lead compact">
      Rejestracja zajmie chwilę. Po zalogowaniu od razu zobaczysz ofertę i swoje konto.
    </p>

    <form class="form-grid" [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Adres e-mail</span>
        <input type="email" formControlName="email" placeholder="np. anna.nowak@example.com" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <small>Podaj poprawny adres e-mail.</small>
        }
      </label>

      <label class="field">
        <span>Imię</span>
        <input type="text" formControlName="firstName" placeholder="np. Anna" />
        @if (form.controls.firstName.touched && form.controls.firstName.invalid) {
          <small>Imię jest wymagane i nie może przekraczać 64 znaków.</small>
        }
      </label>

      <label class="field">
        <span>Nazwisko</span>
        <input type="text" formControlName="lastName" placeholder="np. Nowak" />
        @if (form.controls.lastName.touched && form.controls.lastName.invalid) {
          <small>Nazwisko jest wymagane i nie może przekraczać 64 znaków.</small>
        }
      </label>

      <label class="field">
        <span>Data urodzenia</span>
        <input type="date" [max]="maximumDateOfBirth" formControlName="dateOfBirth" />
        @if (form.controls.dateOfBirth.touched && form.controls.dateOfBirth.invalid) {
          <small>Wybierz poprawną datę urodzenia.</small>
        }
      </label>

      <label class="field">
        <span>Hasło</span>
        <input type="password" formControlName="password" placeholder="minimum 6 znaków" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <small>Hasło musi mieć od 6 do 128 znaków.</small>
        }
      </label>

      <label class="field">
        <span>Powtórz hasło</span>
        <input type="password" formControlName="confirmPassword" placeholder="Powtórz hasło" />
        @if (form.hasError('fieldsMismatch') && form.controls.confirmPassword.touched) {
          <small>Hasła muszą być identyczne.</small>
        }
      </label>

      @if (errorMessage(); as errorMessage) {
        <p class="message-banner error">{{ errorMessage }}</p>
      }

      <button class="primary-action wide-button" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Tworzenie konta...' : 'Utwórz konto i zaloguj' }}
      </button>
    </form>

    <p class="subtle-copy">
      Masz już konto?
      <a routerLink="/login">Przejdź do logowania</a>
    </p>
  </article>
</section>
