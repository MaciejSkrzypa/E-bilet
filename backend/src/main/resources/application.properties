spring.application.name=city-ticket
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/city_ticket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:city_ticket}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:city_ticket}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
