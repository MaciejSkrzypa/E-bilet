spring.application.name=city-ticket
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/city_ticket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:city_ticket}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:city_ticket}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Warsaw
spring.jackson.time-zone=Europe/Warsaw
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.disable-swagger-default-url=true

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

app.jwt.secret=${APP_JWT_SECRET:dev-only-jwt-secret-key-for-development-must-be-at-least-32-chars}
app.jwt.expiration-hours=${APP_JWT_EXPIRATION_HOURS:1}

app.seed.inspector.email=${APP_SEED_INSPECTOR_EMAIL:inspector@example.com}
app.seed.inspector.password=${APP_SEED_INSPECTOR_PASSWORD:inspector}
app.seed.inspector.first-name=${APP_SEED_INSPECTOR_FIRST_NAME:Inspector}
app.seed.inspector.last-name=${APP_SEED_INSPECTOR_LAST_NAME:Default}
app.seed.inspector.date-of-birth=${APP_SEED_INSPECTOR_DATE_OF_BIRTH:1990-01-01}
