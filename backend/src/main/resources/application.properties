spring.application.name=city-ticket
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/city_ticket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:city_ticket}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:city_ticket}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
springdoc.swagger-ui.path=/docs
springdoc.swagger-ui.disable-swagger-default-url=true

# JWT — secret musi mieć min. 32 znaki (HS256 = 256 bitów). W produkcji nadpisać przez APP_JWT_SECRET.
app.jwt.secret=${APP_JWT_SECRET:dev-only-jwt-secret-key-for-development-must-be-at-least-32-chars}
app.jwt.expiration-hours=${APP_JWT_EXPIRATION_HOURS:1}

# Seed biletera (development). Nadpisz w produkcji albo wyłącz seedowanie.
app.seed.inspector.username=${APP_SEED_INSPECTOR_USERNAME:inspector}
app.seed.inspector.password=${APP_SEED_INSPECTOR_PASSWORD:inspector}
